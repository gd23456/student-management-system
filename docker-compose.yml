version: "3.9"

services:
  web:
    build: ./backend
    container_name: edutrack
    ports:
      - "5000:5000"
    volumes:
      - student_data:/data   # SQLite DB persists across restarts
    environment:
      - SECRET_KEY=change-me-in-production
      - DB_PATH=/data/students.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  student_data:
